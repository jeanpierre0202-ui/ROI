name: ROI daily board

on:
  schedule:
    - cron: "0 12 * * 1-5"   # 8am ET
    - cron: "0 15 * * 1-5"   # 11am ET
    - cron: "0 18 * * 1-5"   # 2pm ET
    - cron: "0 21 * * 1-5"   # 5pm ET
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Build board
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ROI_SYNTHESIS_MAX_NAMES: "12"
        run: python -m engine.build_board
      - name: Commit fresh board
        run: |
          git config user.name  "roi-bot"
          git config user.email "roi-bot@users.noreply.github.com"
          git add web/public/board.json
          git diff --staged --quiet || git commit -m "Daily board $(date -u +%Y-%m-%d)"
          git push
