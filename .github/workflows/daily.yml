name: ROI daily board

on:
  schedule:
    - cron: "0 11 * * 1-5"   # 11:00 UTC, Mon–Fri
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build board
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          ROI_PRICE_PROVIDER: stooq
        run: python -m engine.build_board

      - name: Commit fresh board
        run: |
          git config user.name  "roi-bot"
          git config user.email "roi-bot@users.noreply.github.com"
          git add web/public/board.json
          git diff --staged --quiet || git commit -m "Daily board $(date -u +%Y-%m-%d)"
          git push
